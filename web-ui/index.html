<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kitchen Orders</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:"Segoe UI",sans-serif; background:#f0f4f8; min-height:100vh; }
    header { background:#fff; border-bottom:3px solid #16a34a; padding:16px 32px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
    .logo { display:flex; align-items:center; gap:12px; }
    .logo-icon { width:42px; height:42px; background:#16a34a; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:900; color:#fff; }
    .logo-name { font-size:20px; font-weight:800; color:#16a34a; }
    .logo-sub { font-size:11px; color:#94a3b8; margin-top:1px; }
    .badge { background:#dcfce7; color:#16a34a; font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; border:1px solid #86efac; margin-left:8px; }
    .api-pill { display:flex; align-items:center; gap:8px; background:#f8fafc; border:1px solid #e2e8f0; border-radius:8px; padding:8px 16px; font-size:13px; color:#64748b; }
    .dot { width:9px; height:9px; border-radius:50%; background:#cbd5e1; }
    .dot.on { background:#16a34a; box-shadow:0 0 6px #16a34a88; }
    .body { display:grid; grid-template-columns:320px 1fr; min-height:calc(100vh - 73px); }
    .sidebar { background:#fff; border-right:1px solid #e2e8f0; padding:24px; display:flex; flex-direction:column; gap:24px; }
    .sec-label { font-size:11px; font-weight:700; color:#94a3b8; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:12px; }
    input { width:100%; padding:11px 14px; border:1.5px solid #e2e8f0; border-radius:8px; font-size:14px; color:#1e293b; outline:none; background:#f8fafc; transition:border 0.2s; }
    input:focus { border-color:#16a34a; background:#fff; }
    input::placeholder { color:#cbd5e1; }
    .btn-add { width:100%; margin-top:10px; padding:12px; background:#16a34a; color:#fff; font-weight:700; font-size:14px; border:none; border-radius:8px; cursor:pointer; transition:background 0.2s; }
    .btn-add:hover { background:#15803d; }
    .msg { font-size:12px; color:#16a34a; margin-top:8px; min-height:16px; }
    .menu-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .menu-item { background:#f8fafc; border:1.5px solid #e2e8f0; border-radius:10px; padding:14px 8px; text-align:center; cursor:pointer; transition:all 0.2s; font-size:13px; font-weight:600; color:#475569; }
    .menu-item:hover { border-color:#16a34a; background:#f0fdf4; color:#16a34a; }
    .content { padding:28px 32px; }
    .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
    .stat { background:#fff; border-radius:12px; padding:18px 20px; border:1px solid #e2e8f0; box-shadow:0 1px 4px rgba(0,0,0,0.04); }
    .stat-n { font-size:32px; font-weight:800; }
    .stat-l { font-size:11px; color:#94a3b8; margin-top:4px; text-transform:uppercase; letter-spacing:1px; }
    .n-total { color:#16a34a; } .n-pending { color:#f59e0b; } .n-prep { color:#3b82f6; } .n-served { color:#8b5cf6; }
    .orders-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
    .orders-title { font-size:16px; font-weight:700; color:#1e293b; }
    .btn-ref { background:#f8fafc; border:1.5px solid #e2e8f0; color:#64748b; padding:7px 16px; border-radius:8px; font-size:13px; cursor:pointer; font-weight:600; transition:all 0.2s; }
    .btn-ref:hover { border-color:#16a34a; color:#16a34a; }
    .table-wrap { background:#fff; border-radius:12px; border:1px solid #e2e8f0; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,0.04); }
    table { width:100%; border-collapse:collapse; }
    th { font-size:11px; color:#94a3b8; text-transform:uppercase; letter-spacing:1px; padding:12px 18px; text-align:left; background:#f8fafc; border-bottom:1px solid #e2e8f0; }
    td { padding:14px 18px; font-size:14px; color:#334155; border-bottom:1px solid #f1f5f9; }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:#f8fafc; }
    .chip { display:inline-block; padding:3px 12px; border-radius:20px; font-size:11px; font-weight:700; }
    .chip-pending { background:#fef3c7; color:#d97706; }
    .chip-preparing { background:#dbeafe; color:#2563eb; }
    .chip-ready { background:#dcfce7; color:#16a34a; }
    .chip-served { background:#ede9fe; color:#7c3aed; }
    .empty { text-align:center; padding:48px; color:#cbd5e1; font-size:14px; }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-icon">K</div>
      <div>
        <div class="logo-name">Kitchen Orders <span class="badge">v2 · Kubernetes</span></div>
        <div class="logo-sub">Cloud Native Kitchen Management System</div>
      </div>
    </div>
    <div class="api-pill">
      <div class="dot" id="dot"></div>
      <span id="apiStatus">Connecting...</span>
    </div>
  </header>

  <div class="body">
    <div class="sidebar">
      <div>
        <div class="sec-label">Place Order</div>
        <input id="dish" placeholder="e.g. Masala Dosa..." autocomplete="off" />
        <button class="btn-add" onclick="createOrder()">+ Add Order</button>
        <div class="msg" id="msg"></div>
      </div>
      <div>
        <div class="sec-label">Quick Menu</div>
        <div class="menu-grid">
          <div class="menu-item" onclick="quickOrder('Masala Dosa')">Masala Dosa</div>
          <div class="menu-item" onclick="quickOrder('Biryani')">Biryani</div>
          <div class="menu-item" onclick="quickOrder('Paneer Tikka')">Paneer Tikka</div>
          <div class="menu-item" onclick="quickOrder('Idli Sambar')">Idli Sambar</div>
          <div class="menu-item" onclick="quickOrder('Butter Naan')">Butter Naan</div>
          <div class="menu-item" onclick="quickOrder('Mango Lassi')">Mango Lassi</div>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="stats">
        <div class="stat"><div class="stat-n n-total" id="sTotal">0</div><div class="stat-l">Total</div></div>
        <div class="stat"><div class="stat-n n-pending" id="sPending">0</div><div class="stat-l">Pending</div></div>
        <div class="stat"><div class="stat-n n-prep" id="sPrep">0</div><div class="stat-l">Preparing</div></div>
        <div class="stat"><div class="stat-n n-served" id="sServed">0</div><div class="stat-l">Served</div></div>
      </div>
      <div class="orders-bar">
        <div class="orders-title">Live Orders</div>
        <button class="btn-ref" onclick="loadOrders()">Refresh</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>#</th><th>Dish</th><th>Status</th><th>Time</th></tr></thead>
          <tbody id="tbody"><tr><td colspan="4" class="empty">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const API = '/api';
    async function refreshHealth() {
      try {
        const r = await fetch(API+'/health'); const d = await r.json();
        document.getElementById('dot').className='dot on';
        document.getElementById('apiStatus').textContent='API online · db '+d.db;
      } catch(e) { document.getElementById('dot').className='dot'; document.getElementById('apiStatus').textContent='API offline'; }
    }
    async function loadOrders() {
      try {
        const r = await fetch(API+'/orders'); const orders = await r.json();
        const rev = orders.slice().reverse();
        document.getElementById('sTotal').textContent=orders.length;
        document.getElementById('sPending').textContent=orders.filter(o=>o.status==='pending').length;
        document.getElementById('sPrep').textContent=orders.filter(o=>o.status==='preparing').length;
        document.getElementById('sServed').textContent=orders.filter(o=>o.status==='served').length;
        const tb=document.getElementById('tbody');
        if(!rev.length){tb.innerHTML='<tr><td colspan="4" class="empty">No orders yet — use the sidebar to place one!</td></tr>';return;}
        tb.innerHTML=rev.map((o,i)=>`<tr><td style="color:#cbd5e1;font-size:12px;">${orders.length-i}</td><td style="font-weight:600;">${o.dish}</td><td><span class="chip chip-${o.status}">${o.status}</span></td><td style="color:#94a3b8;font-size:12px;">${new Date(o.createdAt).toLocaleTimeString()}</td></tr>`).join('');
      } catch(e){document.getElementById('tbody').innerHTML='<tr><td colspan="4" class="empty" style="color:#fca5a5;">Could not load orders</td></tr>';}
    }
    async function createOrder(dish) {
      const d=dish||document.getElementById('dish').value.trim();
      const msg=document.getElementById('msg');
      if(!d){msg.textContent='Please enter a dish name.';return;}
      try {
        const r=await fetch(API+'/orders',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({dish:d})});
        const data=await r.json();
        msg.textContent='Order placed: '+data.dish;
        document.getElementById('dish').value=''; loadOrders();
      } catch(e){msg.textContent='Error: '+e.message;}
    }
    async function quickOrder(dish){document.getElementById('msg').textContent='Placing: '+dish+'...';await createOrder(dish);}
    document.getElementById('dish').addEventListener('keydown',e=>{if(e.key==='Enter')createOrder();});
    refreshHealth(); loadOrders();
    setInterval(refreshHealth,8000); setInterval(loadOrders,5000);
  </script>
</body>
</html>
