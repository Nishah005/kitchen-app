apiVersion: v1
kind: ConfigMap
metadata:
  name: web-ui-config
  namespace: kitchen-app
data:
  nginx.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;
        location /api/ {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_pass http://api:3000/;
        }
        location /health {
            access_log off;
            default_type text/plain;
            return 200 'OK';
        }
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <title>Kitchen Orders</title>
      <style>
        body { font-family: sans-serif; background: #0b1120; color: #e5e7eb; padding: 28px; }
        h1 { font-size: 28px; }
        input { padding: 10px; border-radius: 8px; border: 1px solid #263347; background: #0d1117; color: white; width: 300px; }
        button { padding: 10px 16px; border-radius: 8px; background: #1f6feb; color: white; border: none; cursor: pointer; margin-left: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border-bottom: 1px solid #263347; text-align: left; }
        th { color: #9ca3af; }
      </style>
    </head>
    <body>
      <h1>Kitchen Orders</h1>
      <div>
        <input id="dish" placeholder="Enter dish name" />
        <button onclick="createOrder()">Create Order</button>
        <button onclick="loadOrders()" style="background:#238636;">Refresh</button>
      </div>
      <table>
        <thead><tr><th>Dish</th><th>Status</th><th>Created</th></tr></thead>
        <tbody id="orders"></tbody>
      </table>
      <script>
        const API = '/api';
        async function loadOrders() {
          try {
            const res = await fetch(API + '/orders');
            const data = await res.json();
            const tbody = document.getElementById('orders');
            tbody.innerHTML = data.reverse().map(o =>
              '<tr><td>' + o.dish + '</td><td>' + o.status + '</td><td>' + new Date(o.createdAt).toLocaleString() + '</td></tr>'
            ).join('');
          } catch(e) { console.error(e); }
        }
        async function createOrder() {
          const dish = document.getElementById('dish').value.trim();
          if (!dish) return alert('Enter a dish name');
          await fetch(API + '/orders', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ dish }) });
          document.getElementById('dish').value = '';
          loadOrders();
        }
        loadOrders();
        setInterval(loadOrders, 5000);
      </script>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-ui-deployment
  namespace: kitchen-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kitchen-web-ui
  template:
    metadata:
      labels:
        app: kitchen-web-ui
    spec:
      containers:
        - name: kitchen-web-ui
          image: nginx:alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
          volumeMounts:
            - name: web-ui-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
            - name: web-ui-config
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
          resources:
            requests:
              memory: '32Mi'
              cpu: '25m'
            limits:
              memory: '64Mi'
              cpu: '100m'
      volumes:
        - name: web-ui-config
          configMap:
            name: web-ui-config
---
apiVersion: v1
kind: Service
metadata:
  name: web-ui-service
  namespace: kitchen-app
spec:
  type: NodePort
  selector:
    app: kitchen-web-ui
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
