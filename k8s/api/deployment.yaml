apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: kitchen-app
data:
  PORT: "3000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: kitchen-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kitchen-api
  template:
    metadata:
      labels:
        app: kitchen-api
    spec:
      containers:
        - name: kitchen-api
          image: kitchen-api:local
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: MONGO_URI
              value: "mongodb://admin:Secret123!@mongodb-service:27017/kitchendb?authSource=admin"
            - name: PORT
              value: "3000"
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 25
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: kitchen-app
spec:
  selector:
    app: kitchen-api
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: api-nodeport
  namespace: kitchen-app
spec:
  type: NodePort
  selector:
    app: kitchen-api
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000
