name: Kitchen App CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: api

      - name: Run lint
        run: npm run lint
        working-directory: api

      - name: Run tests
        run: npm test
        working-directory: api

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image
        run: docker build -t kitchen-api:local ./api --target production

      - name: Build Web UI Docker image
        run: docker build -t kitchen-web:local ./web-ui

      - name: Verify images built
        run: docker images | grep kitchen
